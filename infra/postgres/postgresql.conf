# Shift.ai Postgres tuning — logical replication for Debezium CDC.
# Mounted over the default config in docker-compose.

# Listen on all interfaces so the host can reach Postgres through the
# Docker port mapping (this file fully replaces the default config, so it
# must be set explicitly — otherwise it defaults to localhost-only).
listen_addresses = '*'

# REQUIRED for Debezium / pgoutput logical decoding
wal_level = logical
max_wal_senders = 10
max_replication_slots = 10

# Keep enough WAL around so a paused connector can catch up
wal_keep_size = 512MB

# Reasonable local-dev resource settings for a 650K-row seed
shared_buffers = 256MB
work_mem = 32MB
maintenance_work_mem = 128MB
max_connections = 100

# Make COPY-heavy seeding faster (safe for a throwaway dev DB)
synchronous_commit = off
