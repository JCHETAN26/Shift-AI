# Connection is fully env-driven (zero hardcoded credentials).
shift:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      # Key-pair auth (MFA-enforced accounts can't use password for headless runs).
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'ACCOUNTADMIN') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'SHIFT') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'SHIFT_WH') }}"
      schema: GOLD
      threads: 4
      client_session_keep_alive: false
